# ----------------------------
# VS Code (Microsoft APT repo)
# ----------------------------
---
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Check whether VS Code is already installed
  ansible.builtin.set_fact:
    editors_vscode_installed: "{{ editors_vscode_package_name in ansible_facts.packages }}"

- name: Skip VS Code install tasks when already installed
  ansible.builtin.debug:
    msg: "Skipping VS Code install tasks because {{ editors_vscode_package_name }} is already installed."
  when: editors_vscode_installed
  changed_when: false

- name: Install VS Code when not already installed
  when: not editors_vscode_installed
  block:
    - name: Download Microsoft signing key (ASCII)
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/keys/microsoft.asc"
        dest: "/tmp/microsoft.asc"
        mode: "0644"
      changed_when: false

    - name: Convert Microsoft signing key to keyring (gpg dearmor)
      ansible.builtin.command: >
        gpg --dearmor -o {{ editors_vscode_keyring_path }} /tmp/microsoft.asc
      args:
        creates: "{{ editors_vscode_keyring_path }}"

    - name: Check for legacy VS Code source files
      ansible.builtin.stat:
        path: "{{ vscode_src_path }}"
      loop:
        - /etc/apt/sources.list.d/vscode.list
        - /etc/apt/sources.list.d/vscode.sources
      loop_control:
        loop_var: vscode_src_path
      register: vscode_legacy_sources

    - name: Remove legacy VS Code source files if present
      become: true
      ansible.builtin.file:
        path: "{{ vscode_stat.vscode_src_path }}"
        state: absent
      loop: "{{ vscode_legacy_sources.results }}"
      loop_control:
        loop_var: vscode_stat
        label: "{{ vscode_stat.vscode_src_path }}"
      when:
        - vscode_stat.stat.exists

    - name: Add VS Code APT source (Deb822) - idempotent
      become: true
      ansible.builtin.deb822_repository:
        name: vscode
        types: [deb]
        uris: ["https://packages.microsoft.com/repos/code"]
        suites: ["stable"]
        components: ["main"]
        architectures: ["amd64", "arm64", "armhf"]
        signed_by: "{{ editors_vscode_keyring_path }}"
        state: present

    - name: Install VS Code package
      become: true
      become_method: sudo
      ansible.builtin.apt:
        name: "{{ editors_vscode_package_name }}"
        state: present
        update_cache: true
