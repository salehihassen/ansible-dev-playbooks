# ----------------------------
# Cursor (.deb download + install/upgrade by version)
# ----------------------------
---

# Resolve arch-specific URLs if set to "auto"
- name: Resolve architecture-specific download URLs (Cursor)
  ansible.builtin.set_fact:
    editors_cursor_deb_url_resolved: >-
      {{
        (editors_cursor_deb_url if editors_cursor_deb_url != 'auto' else
         ('https://api2.cursor.sh/updates/download/golden/linux-x64-deb/cursor/' if editors_arch == 'amd64'
          else 'https://api2.cursor.sh/updates/download/golden/linux-arm64-deb/cursor/'))
      }}

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Download Cursor .deb
  ansible.builtin.get_url:
    url: "{{ editors_cursor_deb_url_resolved }}"
    dest: "{{ editors_cursor_deb_path }}"
    mode: "0644"
    force: true

- name: Read Cursor version from downloaded .deb
  ansible.builtin.command: "dpkg-deb -f {{ editors_cursor_deb_path }} Version"
  register: cursor_deb_version
  changed_when: false

- name: Download and install Cursor (privileged block)
  become: true
  become_method: sudo
  block:
  - name: Set installed Cursor version (if present)
    ansible.builtin.set_fact:
      cursor_installed_version: >-
        {{
          (ansible_facts.packages.cursor[0].version)
          if ('cursor' in ansible_facts.packages)
          else ''
        }}
  - name: Install/upgrade Cursor when version differs
    when:
      - cursor_installed_version != (cursor_deb_version.stdout | trim)
    ansible.builtin.apt:
      deb: "{{ editors_cursor_deb_path }}"
      state: present
