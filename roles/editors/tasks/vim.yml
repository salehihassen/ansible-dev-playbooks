# ----------------------------
# Vim
# ----------------------------
---
- name: Check whether Vim is already installed
  ansible.builtin.command: command -v vim
  register: editors_vim_binary
  changed_when: false
  failed_when: false

- name: Set Vim installed state
  ansible.builtin.set_fact:
    editors_vim_installed: "{{ editors_vim_binary.rc == 0 }}"

- name: Skip Vim install tasks when already installed
  ansible.builtin.debug:
    msg: "Skipping Vim install tasks because vim is already installed."
  when: editors_vim_installed
  changed_when: false

- name: Install Vim when not already installed
  when: not editors_vim_installed
  block:
    - name: Install Vim via apt
      when:
        - editors_vim_install_method == "apt"
      become: true
      become_method: sudo
      ansible.builtin.apt:
        name: vim
        state: present
        update_cache: true

    # Optional "latest" Vim (source build). Off by default to keep role simple.
    - name: Install Vim build deps (only if Vim latest/source build enabled)
      when:
        - editors_vim_install_method == "latest"
      become: true
      become_method: sudo
      ansible.builtin.apt:
        name:
          - git
          - build-essential
          - ncurses-dev
          - libncursesw5-dev
          - libgtk-3-dev
          - libx11-dev
          - libxpm-dev
          - libxt-dev
          - python3-dev
          - ruby-dev
          - lua5.4
          - liblua5.4-dev
        state: present
        update_cache: true

    - name: Clone Vim sources (tag)
      when:
        - editors_vim_install_method == "latest"
      ansible.builtin.git:
        repo: "{{ editors_vim_git_repo }}"
        dest: "{{ editors_vim_src_dir }}"
        version: "{{ editors_vim_tag }}"
        depth: 1
        force: true

    - name: Build Vim from source
      when:
        - editors_vim_install_method == "latest"
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ editors_vim_src_dir }}"
        make distclean || true
        ./configure {{ editors_vim_configure_opts | join(' ') }}
        make -j"$(nproc)"
        make install
      args:
        executable: /bin/bash

    - name: Install Vim from source
      become: true
      become_method: sudo
      when:
        - editors_vim_install_method == "latest"
      ansible.builtin.shell: |
        cd "{{ editors_vim_src_dir }}"
        make install
