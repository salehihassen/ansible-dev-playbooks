# ----------------------------
# Vim
# ----------------------------
---
- name: Install Vim via apt
  when:
    - editors_vim_install_method == "apt"
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name: vim
    state: present
    update_cache: true

# Optional "latest" Vim (source build). Off by default to keep role simple.
- name: Install Vim build deps (only if Vim latest/source build enabled)
  when:
    - editors_vim_install_method == "latest"
  become: true
  become_method: sudo
  ansible.builtin.apt:
    name:
      - git
      - build-essential
      - ncurses-dev
      - libncursesw5-dev
      - libgtk-3-dev
      - libx11-dev
      - libxpm-dev
      - libxt-dev
      - python3-dev
      - ruby-dev
      - lua5.4
      - liblua5.4-dev
    state: present
    update_cache: true

- name: Check current Vim version (if any)
  when:
    - editors_vim_install_method == "latest"
  ansible.builtin.command: vim --version
  register: vim_version_cmd
  changed_when: false
  failed_when: false

- name: Determine if Vim needs install (no vim or not matching configured tag major.minor)
  when:
    - editors_vim_install_method == "latest"
  ansible.builtin.set_fact:
    vim_needs_install: >-
      {{
        (vim_version_cmd.rc != 0) or
        (vim_version_cmd.stdout is not search('VIM - Vi IMproved 9\\.2'))
      }}

- name: Clone Vim sources (tag)
  when:
    - editors_vim_install_method == "latest"
    - vim_needs_install | bool
  ansible.builtin.git:
    repo: "{{ editors_vim_git_repo }}"
    dest: "{{ editors_vim_src_dir }}"
    version: "{{ editors_vim_tag }}"
    depth: 1
    force: true

- name: Build Vim from source
  when:
    - editors_vim_install_method == "latest"
    - vim_needs_install | bool
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ editors_vim_src_dir }}"
    make distclean || true
    ./configure {{ editors_vim_configure_opts | join(' ') }}
    make -j"$(nproc)"
    make install
  args:
    executable: /bin/bash

- name: Install Vim from source  
  become: true
  become_method: sudo
  when:
    - editors_vim_install_method == "latest"
    - vim_needs_install | bool
  ansible.builtin.shell: |
    cd "{{ editors_vim_src_dir }}"
    make install
