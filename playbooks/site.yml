# Setup all roles via cli passed args

- hosts: localhost
  connection: local
  become: true
  vars:
    # Accept either:
    #   -e 'roles_to_run=["editors","docker"]'   (JSON-like string)
    #   -e 'roles_to_run=[editors,docker]'      (YAML list)
    #   -e 'roles_to_run=editors'               (single string)
    roles_to_run_list: >-
      {{
        roles_to_run
        if (roles_to_run is sequence and roles_to_run is not string)
        else (roles_to_run | from_yaml)
      }}

  roles: "{{ roles_to_run_list }}"
